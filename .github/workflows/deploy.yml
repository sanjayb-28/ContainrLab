name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      mode:
        description: "Run mode"
        type: choice
        required: true
        default: build-and-deploy
        options:
          - build-only
          - build-and-deploy

env:
  AWS_REGION: us-east-1
  ECR_REGISTRY: 143353052888.dkr.ecr.us-east-1.amazonaws.com

jobs:
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    outputs:
      sha: ${{ github.sha }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push API image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ECR_REGISTRY }}/containrlab-api:latest
            ${{ env.ECR_REGISTRY }}/containrlab-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Web image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: linux/amd64
          build-args: |
            NEXT_PUBLIC_API_BASE=https://${{ vars.API_HOST }}
          tags: |
            ${{ env.ECR_REGISTRY }}/containrlab-web:latest
            ${{ env.ECR_REGISTRY }}/containrlab-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push Runner image
        uses: docker/build-push-action@v5
        with:
          context: ./runner
          file: ./runner/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ECR_REGISTRY }}/containrlab-runner:latest
            ${{ env.ECR_REGISTRY }}/containrlab-runner:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & push RunnerD image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./runner/supervisor/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            ${{ env.ECR_REGISTRY }}/containrlab-runnerd:latest
            ${{ env.ECR_REGISTRY }}/containrlab-runnerd:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy to ECS
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event.inputs.mode == 'build-and-deploy'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Register API/Web task definition
        id: api-web-taskdef
        run: |
          ARN=$(aws ecs register-task-definition \
            --cli-input-json file://infra/task-definitions/api-web-task.json \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$ARN" >> $GITHUB_OUTPUT

      - name: Register Runner task definition
        id: runner-taskdef
        run: |
          ARN=$(aws ecs register-task-definition \
            --cli-input-json file://infra/task-definitions/runner-task.json \
            --region ${{ env.AWS_REGION }} \
            --query 'taskDefinition.taskDefinitionArn' --output text)
          echo "arn=$ARN" >> $GITHUB_OUTPUT

      - name: Deploy API/Web service
        run: |
          aws ecs update-service \
            --cluster containrlab-cluster \
            --service containrlab-service \
            --task-definition ${{ steps.api-web-taskdef.outputs.arn }} \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Deploy Runner service
        run: |
          aws ecs update-service \
            --cluster containrlab-runner-ec2 \
            --service containrlab-runner-service \
            --task-definition ${{ steps.runner-taskdef.outputs.arn }} \
            --deployment-configuration "minimumHealthyPercent=0,maximumPercent=200" \
            --force-new-deployment \
            --region ${{ env.AWS_REGION }}

      - name: Wait for API/Web stable
        run: |
          aws ecs wait services-stable \
            --cluster containrlab-cluster \
            --services containrlab-service \
            --region ${{ env.AWS_REGION }}

      - name: Wait for Runner stable
        run: |
          aws ecs wait services-stable \
            --cluster containrlab-runner-ec2 \
            --services containrlab-runner-service \
            --region ${{ env.AWS_REGION }}

      - name: Verify health
        run: |
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ vars.API_HOST }}/healthz")
          WEB_STATUS=$(curl -s -o /dev/null -w "%{http_code}" "https://${{ vars.WEB_HOST }}")
          echo "API $API_STATUS  WEB $WEB_STATUS"
          [ "$API_STATUS" = "200" ] || { echo "API health failed"; exit 1; }
          [ "$WEB_STATUS" = "200" ] || { echo "WEB health failed"; exit 1; }
